services:
  - type: web
    name: axilattice-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: DUCKDB_PATH
        value: /opt/render/project/data/axilattice.duckdb
    disk:
      name: cube-data
      mountPath: /opt/render/project/data
      sizeGB: 5

  - type: web
    name: axilattice-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # set to your backend Render URL, e.g. https://axilattice-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
